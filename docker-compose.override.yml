# =============================================================================
# docker-compose.override.yml — Local development overrides
# =============================================================================
# This file overrides docker-compose.yml to use local Dockerfile builds
# instead of pulling from ghcr.io. Docker Compose automatically merges
# override files when running `docker compose up`.
#
# To use for local development:
#   docker compose up   # (override is applied automatically)
#
# For production (pull from ghcr.io):
#   docker compose -f docker-compose.yml up
# =============================================================================

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    # Remove image directive for local builds
    image: ""

  db-migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    image: ""

  dramatiq-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    image: ""

  periodiq-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    image: ""
