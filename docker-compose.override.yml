# Development overrides — auto-loaded by `docker compose up`
# Override ports or settings via environment variables or .env file

services:
  web:
    build:
      target: web-dev
    volumes:
      - .:/app
      - /app/.venv # preserve image's venv, don't shadow with host's
    environment:
      WEB_RELOAD: "1"
      WEB_LOG_LEVEL: debug
      WEB_WORKERS: "1"
    ports:
      # Override the base port mapping for dev (avoids conflicts with local services)
      - "8765:8000"
    stdin_open: true
    tty: true

  #llamacpp:
  #  ports:
  #    - "8090:8080"

  dramatiq-worker:
    build:
      target: worker-dev
    volumes:
      - .:/app
      - /app/.venv # preserve image's venv, don't shadow with host's
    environment:
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
    stdin_open: true
    tty: true

  periodiq-scheduler:
    build:
      target: worker-dev
    volumes:
      - .:/app
      - /app/.venv # preserve image's venv, don't shadow with host's

  dozzle:
    ports:
      - "9999:8080"

  # Mailpit — local SMTP catch-all for development.
  # All emails sent by the worker are captured here instead of
  # being delivered to real recipients.
  # Web UI: http://localhost:8025
  # SMTP:   localhost:1025
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025" # Web UI
      - "1025:1025" # SMTP
    volumes:
      - mailpit-data:/data
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - news48-net

volumes:
  mailpit-data:
