# =============================================================================
# docker-compose.override.yml — Local development overrides
# =============================================================================
# This file overrides docker-compose.yml to use local Dockerfile builds
# instead of pulling from ghcr.io. Docker Compose automatically merges
# override files when running `docker compose up`.
#
# Local development:
#   # With llamacpp (requires GPU):
#   docker compose -f docker-compose.yml -f docker-compose.override.yml up -d
#
#   # Without llamacpp (no GPU needed):
#   docker compose -f docker-compose.no-llamacpp.yml -f docker-compose.override.yml up -d
#
# Production (pull from ghcr.io):
#   docker compose -f docker-compose.yml up -d
# =============================================================================

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    image: ""
    ports:
      - "8765:8000"

  db-migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    image: ""

  dramatiq-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    image: ""

  periodiq-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    image: ""
