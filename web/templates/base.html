<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}news48{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/static/style.css" />
    {% block og_tags %}{% endblock %}
    {% block json_ld %}{% endblock %}
</head>

<body class="{% block body_class %}{% endblock %}">
    <main class="page">
        {% block content %}{% endblock %}
    </main>
    <footer class="site-footer" aria-label="Site footer">
        <div class="site-footer__inner">
            <p class="site-footer__content">
                <span>Made with ❤️</span>
                <span aria-hidden="true">·</span>
                <span>Powered by Open Source</span>
                <span aria-hidden="true">·</span>
                <a href="https://github.com/malvavisc0/news48" target="_blank" rel="noopener">v0.0.1</a>
            </p>
        </div>
    </footer>
</body>

</html>
