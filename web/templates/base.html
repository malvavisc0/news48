<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}news48{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/static/style.css" />
    {% block og_tags %}{% endblock %}
    {% block json_ld %}{% endblock %}
</head>

<body class="{% block body_class %}{% endblock %}">
    <main class="page">
        {% block content %}{% endblock %}
    </main>
</body>

</html>
