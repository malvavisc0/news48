[project]
name = "news48"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "aiosqlite",
    "dateparser",
    "feedparser",
    "html-to-markdown",
    "httpx",
    "llama-index-llms-openai-like",
    "loguru",
    "pydantic",
    "python-dotenv",
    "typer",
]

[project.scripts]
news48 = "main:main"

[tool.setuptools]
packages = ["agents", "commands"]
py-modules = ["config", "database", "helpers", "models", "main"]

[tool.uv]
package = true

[dependency-groups]
dev = ["black", "isort", "pytest"]
