[project]
name = "news48"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "aiosqlite>=0.22.1",
    "dateparser>=1.3.0",
    "feedparser>=6.0.12",
    "httpx>=0.28.1",
    "llama-index-llms-openai-like>=0.6.0",
    "pydantic>=2.12.5",
    "python-dotenv>=1.2.2",
    "typer>=0.24.1",
]

[project.scripts]
news48 = "main:main"

[tool.setuptools]
packages = ["agents", "commands"]
py-modules = ["config", "database", "helpers", "models", "main"]

[tool.uv]
package = true

[dependency-groups]
dev = ["black>=26.3.0", "isort>=8.0.1"]
