[project]
name = "news48"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "dateparser",
    "feedparser",
    "html-to-markdown",
    "httpx",
    "llama-index-llms-openai-like",
    "loguru",
    "pydantic",
    "python-dotenv",
    "rich",
    "typer",
    "Jinja2",
    "fastapi",
    "uvicorn",
    "dramatiq",
    "periodiq",
    "redis",
    "SQLAlchemy",
    "alembic",
    "mysql-connector-python",
]

[project.scripts]
news48 = "main:main"

[tool.setuptools]
packages = ["agents", "commands", "database", "helpers", "web"]
py-modules = ["config", "models", "main"]

[tool.uv]
package = true

[dependency-groups]
web = [
    "fastapi",
    "uvicorn",
    "Jinja2",
    "python-dotenv",
    "sqlalchemy",
    "mysql-connector-python",
    "alembic",
]
dev = ["black", "isort", "pytest"]
