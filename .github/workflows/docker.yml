name: Docker — Build & Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --frozen --extra all --group dev
      - name: Run tests
        run: uv run pytest -v

  check-version:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(grep -oP '__version__\s*=\s*"\K[^"]+' news48/__init__.py)
          echo "Tag version:     $TAG_VERSION"
          echo "Package version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match news48/__init__.py version $PKG_VERSION"
            exit 1
          fi
          echo "✓ Versions match"

  build:
    needs: [test, check-version]
    if: always() && needs.test.result == 'success' && (needs.check-version.result == 'success' || needs.check-version.result == 'skipped')
    strategy:
      matrix:
        target: [web, worker]
        platform:
          - runner: ubuntu-latest
            docker: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            docker: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,suffix=-${{ matrix.target }}-${{ matrix.platform.suffix }}
            type=semver,pattern={{version}},suffix=-${{ matrix.target }}-${{ matrix.platform.suffix }}
            type=semver,pattern={{major}}.{{minor}},suffix=-${{ matrix.target }}-${{ matrix.platform.suffix }}
            type=sha,suffix=-${{ matrix.target }}-${{ matrix.platform.suffix }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platform.docker }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  merge:
    needs: [build]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [web, worker]
    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-platform manifest
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          # Determine tag prefixes based on ref
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            MAJOR_MINOR="${VERSION%.*}"
            TAGS=("${VERSION}-${{ matrix.target }}" "${MAJOR_MINOR}-${{ matrix.target }}")
          else
            TAGS=("${GITHUB_REF_NAME}-${{ matrix.target }}")
          fi

          # latest tag (matches docker-compose.prod.yml image references)
          TAGS+=("latest-${{ matrix.target }}")

          # SHA tag (matches metadata action's type=sha format)
          SHA="${GITHUB_SHA::7}"
          TAGS+=("sha-${SHA}-${{ matrix.target }}")

          for TAG in "${TAGS[@]}"; do
            echo "Merging manifest for ${IMAGE}:${TAG}"
            docker buildx imagetools create \
              -t "${IMAGE}:${TAG}" \
              "${IMAGE}:${TAG}-amd64" \
              "${IMAGE}:${TAG}-arm64"
          done
