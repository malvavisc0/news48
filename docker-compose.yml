services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    entrypoint: [ "/app/scripts/docker-entrypoint.sh" ]
    command: [ "uvicorn", "news48.web.app:app", "--host", "0.0.0.0", "--port", "8000" ]
    volumes:
      - news48-data:/data
    environment:
      TZ: ${TZ:-Europe/Berlin}
      DATABASE_URL: mysql+mysqlconnector://${MYSQL_USER:-news48}:${MYSQL_PASSWORD:-news48}@mysql:3306/${MYSQL_DATABASE:-news48}
      DATA_DIR: /data
      REDIS_URL: redis://redis:6379/0
      WEB_HOST: ${WEB_HOST:-0.0.0.0}
      WEB_PORT: ${WEB_PORT:-8000}
      WEB_WORKERS: ${WEB_WORKERS:-1}
      WEB_LOG_LEVEL: ${WEB_LOG_LEVEL:-info}
      WEB_RELOAD: ${WEB_RELOAD:-0}
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:-127.0.0.1}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      llamacpp:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    networks:
      - news48-net

  mysql:
    image: mysql:8.0
    # MySQL port is NOT exposed to host in production.
    # Uncomment below for local development access only.
    # ports:
    #   - "127.0.0.1:3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    environment:
      TZ: ${TZ:-Europe/Berlin}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-news48}
      MYSQL_USER: ${MYSQL_USER:-news48}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-news48}
    command: >
      --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --innodb-ft-min-token-size=2
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - news48-net

  # One-shot init container that runs Alembic migrations exactly once.
  # Prevents race conditions when multiple services start concurrently.
  db-migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    entrypoint: [ "/app/scripts/docker-entrypoint.sh" ]
    command: [ "alembic", "upgrade", "head" ]
    environment:
      TZ: ${TZ:-Europe/Berlin}
      DATABASE_URL: mysql+mysqlconnector://${MYSQL_USER:-news48}:${MYSQL_PASSWORD:-news48}@mysql:3306/${MYSQL_DATABASE:-news48}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - news48-net

  # One-shot init container that downloads the GGUF model before the server starts.
  # Shares the llamacpp-models volume so the model is immediately available.
  llamacpp-init:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda13
    entrypoint: [ "bash", "/app/download-model.sh" ]
    volumes:
      - llamacpp-models:/models
      - ./scripts/download-model.sh:/app/download-model.sh:ro
    environment:
      TZ: ${TZ:-Europe/Berlin}
      LLAMACPP_MODEL_REPO: ${LLAMACPP_MODEL_REPO:-mradermacher/claude-oss-i1-GGUF}
      LLAMACPP_MODEL_FILE: ${LLAMACPP_MODEL_FILE:-claude-oss.i1-Q6_K.gguf}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    networks:
      - news48-net

  llamacpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda13
    entrypoint: [ "bash", "/app/llamacpp-entrypoint.sh" ]
    volumes:
      - llamacpp-models:/models
      - ./scripts/llamacpp-entrypoint.sh:/app/llamacpp-entrypoint.sh:ro
    environment:
      TZ: ${TZ:-Europe/Berlin}
      LLAMACPP_MODEL_REPO: ${LLAMACPP_MODEL_REPO:-mradermacher/claude-oss-i1-GGUF}
      LLAMACPP_MODEL_FILE: ${LLAMACPP_MODEL_FILE:-claude-oss.i1-Q6_K.gguf}
      LLAMACPP_CTX_SIZE: ${LLAMACPP_CTX_SIZE:-131072}
      LLAMACPP_PORT: ${LLAMACPP_PORT:-8080}
      LLAMACPP_HOST: 0.0.0.0
      LLAMACPP_N_GPU_LAYERS: ${LLAMACPP_N_GPU_LAYERS:-999}
      LLAMACPP_PARALLEL: ${LLAMACPP_PARALLEL:-12}
      LLAMACPP_THREADS: ${LLAMACPP_THREADS:-16}
      LLAMACPP_CACHE_TYPE_K: ${LLAMACPP_CACHE_TYPE_K:-q8_0}
      LLAMACPP_CACHE_TYPE_V: ${LLAMACPP_CACHE_TYPE_V:-q8_0}
      LLAMACPP_FLASH_ATTN: ${LLAMACPP_FLASH_ATTN:-on}
    depends_on:
      llamacpp-init:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    networks:
      - news48-net

  searxng:
    image: searxng/searxng:latest
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      TZ: ${TZ:-Europe/Berlin}
      SEARXNG_SECRET: ${SEARXNG_SECRET:-changeme}
      SEARXNG_BASE_URL: http://searxng:8080/
    networks:
      - news48-net

  byparr:
    image: ghcr.io/thephaseless/byparr:main
    environment:
      TZ: ${TZ:-Europe/Berlin}
    networks:
      - news48-net

  dozzle:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dozzle-data:/data
    environment:
      TZ: ${TZ:-Europe/Berlin}
      # Shell and actions disabled for security — enable only for debugging.
      DOZZLE_ENABLE_ACTIONS: "false"
      DOZZLE_ENABLE_SHELL: "false"
    networks:
      - news48-net

  # Redis broker for Dramatiq task queues.
  # redis-stack includes RedisInsight UI at :8001 — useful during development.
  # For production, consider switching to redis:7-alpine for lower overhead.
  redis:
    image: redis/redis-stack:latest
    # Ports NOT exposed in production.
    # Uncomment below for local development access only.
    # ports:
    #   - "6379:6379"   # Redis API
    #   - "127.0.0.1:8001:8001"  # RedisInsight
    volumes:
      - redis-data:/data
    environment:
      TZ: ${TZ:-Europe/Berlin}
      REDIS_ARGS: --save 60 1000 --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - news48-net

  # Dramatiq worker — consumes task queues and executes agents.
  # Uses the same worker image but overrides the command.
  dramatiq-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    entrypoint: [ "/app/scripts/docker-entrypoint.sh" ]
    command: [ "dramatiq", "news48.core.agents.actors", "--processes", "1", "--threads", "8" ]
    volumes:
      - news48-data:/data
    environment:
      TZ: ${TZ:-Europe/Berlin}
      DATABASE_URL: mysql+mysqlconnector://${MYSQL_USER:-news48}:${MYSQL_PASSWORD:-news48}@mysql:3306/${MYSQL_DATABASE:-news48}
      DATA_DIR: /data
      REDIS_URL: redis://redis:6379/0
      API_BASE: ${API_BASE}
      API_KEY: ${API_KEY}
      MODEL: ${MODEL}
      CONTEXT_WINDOW: ${CONTEXT_WINDOW:-49152}
      BYPARR_API_URL: ${BYPARR_API_URL:-http://byparr:8191/v1}
      SEARXNG_URL: ${SEARXNG_URL:-http://searxng:8080}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      MONITOR_EMAIL_TO: ${MONITOR_EMAIL_TO}
      PARSER_CONCURRENCY: ${PARSER_CONCURRENCY:-12}
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      llamacpp:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    networks:
      - news48-net

  # Periodiq scheduler — enqueues periodic tasks to Redis queues.
  periodiq-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    entrypoint: [ "/app/scripts/docker-entrypoint.sh" ]
    command: [ "periodiq", "news48.core.agents.actors" ]
    volumes:
      - news48-data:/data
    environment:
      TZ: ${TZ:-Europe/Berlin}
      DATABASE_URL: mysql+mysqlconnector://${MYSQL_USER:-news48}:${MYSQL_PASSWORD:-news48}@mysql:3306/${MYSQL_DATABASE:-news48}
      DATA_DIR: /data
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      llamacpp:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    networks:
      - news48-net

volumes:
  news48-data:
  mysql-data:
  llamacpp-models:
  dozzle-data:
  redis-data:

networks:
  news48-net:
    driver: bridge
