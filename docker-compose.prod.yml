services:
  mysql:
    restart: unless-stopped
    command: >
      --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --innodb-ft-min-token-size=2 --max-connections=200 --innodb-buffer-pool-size=256M
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # One-shot init container — uses pre-built worker image instead of building locally.
  db-migrate:
    image: ghcr.io/malvavisc0/news48:latest-worker
    entrypoint: [ "alembic", "upgrade", "head" ]
    depends_on:
      mysql:
        condition: service_healthy

  web:
    image: ghcr.io/malvavisc0/news48:latest-web
    ports:
      - "8000:8000"
    environment:
      - WEB_HOST=0.0.0.0
      - WEB_WORKERS=4
      - WEB_LOG_LEVEL=info
      - WEB_RELOAD=0
      - FORWARDED_ALLOW_IPS=*
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m

  searxng:
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/healthz" ]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  llamacpp:
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

  byparr:
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8191/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  redis:
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    restart: unless-stopped

  dramatiq-worker:
    image: ghcr.io/malvavisc0/news48:latest-worker
    volumes:
      - ./seed.txt:/app/seed.txt:ro
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      llamacpp:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD", "python", "-c", "import redis; r=redis.from_url('redis://redis:6379/0'); r.ping()" ]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  periodiq-scheduler:
    image: ghcr.io/malvavisc0/news48:latest-worker
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      llamacpp:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
