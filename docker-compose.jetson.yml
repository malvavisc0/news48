# Jetson / ARM64 override — replaces Docker llamacpp with no-op stubs.
# The actual llama.cpp runs on the host at jetson:7070.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.jetson.yml up -d
#
# Set API_BASE in .env:
#   API_BASE=http://jetson:7070/v1

services:
  # No-op: skip model download (model is managed by host llama.cpp)
  llamacpp-init:
    image: busybox
    entrypoint: [ "sh", "-c", "echo 'Skipping model download — using host llama.cpp' && exit 0" ]
    volumes: []
    environment: []

  # No-op: skip Docker llama.cpp server (using host at jetson:7070)
  llamacpp:
    image: busybox
    entrypoint: [ "sh", "-c", "echo 'Skipping Docker llamacpp — using host at jetson:7070' && sleep infinity" ]
    healthcheck:
      test: [ "CMD", "true" ]
      interval: 5s
      timeout: 2s
      retries: 1
      start_period: 1s
    volumes: []
    environment: []
    depends_on:
      llamacpp-init:
        condition: service_completed_successfully
